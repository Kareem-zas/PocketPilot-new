name: pockect_pilot
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hexcolor: ^3.0.2
  get: ^4.7.3
  image_picker: ^1.0.7
  google_mlkit_text_recognition: ^0.13.0
  http: ^1.2.0
  shared_preferences: ^2.2.2
  provider: ^6.0.5
  flutter_sms_inbox: ^1.0.4
  permission_handler: ^11.3.1
  fl_chart: ^1.2.0
  geolocator: ^11.0.0
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0
  flutter_local_notifications: ^18.0.1
  telephony: ^0.2.0
  workmanager: ^0.9.0+3
  timezone: ^0.10.1
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: SF
      fonts:
        - asset: assets/fonts/SF-Pro.ttf
        - asset: assets/fonts/SF-Pro-Display-Regular.otf
          weight: 300
